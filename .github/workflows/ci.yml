name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests + code generation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=bakec --cov-report=term-missing

      - name: Generate all targets
        run: |
          python -m bakec.cli generate --model models/lung_mnarx.yaml --platform platforms/desktop.yaml --output generated/desktop/
          python -m bakec.cli generate --model models/lung_mnarx.yaml --platform platforms/cortex_m4.yaml --output generated/cortex_m4/
          python -m bakec.cli generate --model models/pid_controller.yaml --platform platforms/desktop.yaml --output generated/desktop/
          python -m bakec.cli generate --model models/pid_controller.yaml --platform platforms/cortex_m4.yaml --output generated/cortex_m4/
          python -m bakec.cli generate --model models/lung_mnarx.yaml --platform platforms/aurix_tc397.yaml --output generated/aurix_tc397/
          python -m bakec.cli generate --model models/pid_controller.yaml --platform platforms/aurix_tc397.yaml --output generated/aurix_tc397/

      - name: Validate generated code
        run: |
          python -m bakec.cli validate --target generated/desktop/ --rules src/bakec/checks/rules.yaml --platforms-dir platforms/
          python -m bakec.cli validate --target generated/cortex_m4/ --rules src/bakec/checks/rules.yaml --platforms-dir platforms/
          python -m bakec.cli validate --target generated/aurix_tc397/ --rules src/bakec/checks/rules.yaml --platforms-dir platforms/

  build:
    name: Full pipeline (make all)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full pipeline
        run: make all
